<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 10 — METHOD — algorithm formulation</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@500;600;700;800&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100vh;background:#E4DFD3;overflow:hidden;position:relative;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  .stage{width:1920px;height:1080px;position:absolute;top:50%;left:50%;transform-origin:0 0;}
  .slide{width:1920px;height:1080px;overflow:hidden;position:relative;border-radius:4px;box-shadow:0 20px 80px rgba(0,0,0,0.14);}
  @media print{@page{size:1920px 1080px;margin:0;}html,body{width:1920px;height:1080px;background:transparent!important;overflow:hidden;-webkit-print-color-adjust:exact;print-color-adjust:exact;}.stage{position:static!important;top:0!important;left:0!important;transform:none!important;}.slide{box-shadow:none!important;border-radius:0!important;}*,*::before,*::after{-webkit-backdrop-filter:none!important;backdrop-filter:none!important;}}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script type="text/babel" data-presets="react" src="components.js"></script>
</head>
<body>
<div class="stage" id="stage"><div class="slide" id="slide-root"></div></div>
<script type="text/babel" data-presets="react">
(function(){
const { SlideFrame, Eyebrow, SlideTitle, BodyText, PageNum, Card, Callout, C, TYPE_SCALE, SPACING, FONT_DISPLAY, FONT_SANS, FONT_MONO, SourceLine } = window;

const SPECS = [
  ["learner", "LogisticRegression · C=4.0 · balanced"],
  ["word", "token TF-IDF · 1-2 gram · min_df=2"],
  ["char", "raw title char_wb · 2-5 gram · max 8k"],
  ["lexicon", "7 risk counters + OTHER/generic/cyber cues"],
  ["τ", "inner-CV selected · 0.40 / 0.55 / 0.55"],
];
const PIPE = [
  {n:"01", t:"represent", f:"φ(xᵢ) = [ψ_word(tokᵢ); ψ_char(rawᵢ); m_tax(xᵢ); c_other(xᵢ)]", d:"토큰 의미, 원문 문자형 변형, 위험 메커니즘, OTHER 담론 신호를 하나의 sparse vector로 결합"},
  {n:"02", t:"detect", f:"sᵢ = P(zᵢ=1 | φᵢ) = σ(wᵈ·φᵢ)", d:"zᵢ는 risk 여부다. detector는 risk probability를 내고, fold마다 threshold를 따로 calibration한다."},
  {n:"03", t:"calibrate", f:"τₖ = argmax F1(τ),  s.t. Precision ≥ .86, Recall ≥ .82", d:"evaluation fold를 보지 않는다. training fold 내부 OOF score로 gate-aware threshold를 고른다."},
  {n:"04", t:"type only risk", f:"ŷᵢ = OTHER if sᵢ < τₖ; otherwise argmaxᵣ P(r | φᵢ)", d:"risk로 통과한 기사에만 7개 SCRM risk type classifier를 적용한다."},
];

function FormulaStep({x}){
  return (
    <div style={{display:"grid",gridTemplateColumns:"68px 1fr",gap:14,alignItems:"stretch"}}>
      <div style={{background:C.accentSoft,border:`1px solid rgba(190,122,20,0.35)`,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FONT_DISPLAY,fontSize:34,fontWeight:800,color:C.accent}}>{x.n}</div>
      <div style={{background:C.panel,border:`1px solid ${C.rule}`,borderRadius:10,padding:"13px 18px"}}>
        <div style={{fontFamily:FONT_MONO,fontSize:13,color:C.accent,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:6}}>{x.t}</div>
        <div style={{fontFamily:FONT_MONO,fontSize:20,color:C.ink,lineHeight:1.24,letterSpacing:"0.01em",whiteSpace:"nowrap"}}>{x.f}</div>
        <div style={{fontFamily:FONT_SANS,fontSize:17,color:C.inkSoft,lineHeight:1.34,marginTop:8}}>{x.d}</div>
      </div>
    </div>
  );
}
function SpecRow({s}){
  return (
    <div style={{display:"grid",gridTemplateColumns:"92px 1fr",gap:12,padding:"9px 0",borderBottom:`1px solid ${C.ruleSoft}`}}>
      <div style={{fontFamily:FONT_MONO,fontSize:12,color:C.real,letterSpacing:"0.09em",textTransform:"uppercase"}}>{s[0]}</div>
      <div style={{fontFamily:FONT_SANS,fontSize:17,color:C.inkSoft,lineHeight:1.28}}>{s[1]}</div>
    </div>
  );
}
function TraceBox(){
  return (
    <div style={{background:C.realSoft,border:`1px solid rgba(44,138,115,0.32)`,borderRadius:12,padding:"18px 22px"}}>
      <div style={{fontFamily:FONT_MONO,fontSize:13,color:C.real,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:12}}>execution trace</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:12,alignItems:"center"}}>
        <div style={{fontFamily:FONT_DISPLAY,fontSize:32,fontWeight:800,color:C.ink,lineHeight:1.05}}>699<br/>items</div>
        <div style={{fontFamily:FONT_MONO,fontSize:28,color:C.inkMuted}}>→</div>
        <div style={{fontFamily:FONT_DISPLAY,fontSize:32,fontWeight:800,color:C.real,lineHeight:1.05}}>3-fold<br/>OOF</div>
      </div>
      <div style={{marginTop:14,fontFamily:FONT_SANS,fontSize:17,color:C.inkSoft,lineHeight:1.34}}>
        각 fold에서 representation은 training fold로만 fit되고, threshold도 inner-CV에서만 선택된다. 최종 metric은 fold 밖 예측만 합산한다.
      </div>
    </div>
  );
}
function Slide(){
  return (
    <SlideFrame>
      <Eyebrow>10 · METHOD — algorithm formulation</Eyebrow>
      <SlideTitle size={38} style={{marginTop:SPACING.titleGap,maxWidth:1580}}>우리가 만든 엔진은 feature 조합이 아니라, <span style={{color:C.real}}>open-set triage decision rule</span>이다</SlideTitle>
      <BodyText muted size={22} style={{marginTop:18,maxWidth:1430}}>핵심은 기사 표현, risk detector, threshold calibration, risk-only typer를 분리한 것이다. 이 분리가 FP·FN·type error를 각각 줄이는 알고리즘적 장치다.</BodyText>

      <div style={{position:"absolute",left:SPACING.paddingX,right:SPACING.paddingX,top:326,display:"grid",gridTemplateColumns:"1.14fr 0.86fr",gap:28,alignItems:"start"}}>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          {PIPE.map((x,i)=><FormulaStep key={i} x={x}/>)}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Card tone="real" style={{padding:"18px 22px"}}>
            <div style={{fontFamily:FONT_MONO,fontSize:13,color:C.real,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:10}}>implementation constants</div>
            {SPECS.map((s,i)=><SpecRow key={i} s={s}/>)}
          </Card>
          <TraceBox />
        </div>
      </div>

      <Callout tone="real" style={{position:"absolute",left:SPACING.paddingX,right:SPACING.paddingX,bottom:102,maxWidth:1560}}>연구 기여는 “더 큰 모델”이 아니라, open-set 구조를 detector·threshold·typer로 분해한 재현 가능한 알고리즘이다.</Callout>
      <SourceLine>src/mechanism_engine.py · mechanism_engine_eval.json · research_gate.json</SourceLine>
      <PageNum n={10}/>
    </SlideFrame>
  );
}
ReactDOM.createRoot(document.getElementById('slide-root')).render(<Slide/>);
requestAnimationFrame(()=>document.body.setAttribute('data-slide-ready','1'));
})();
</script>
<script>
function scaleSlide(){const s=document.getElementById('stage');if(!s)return;const sc=Math.min(innerWidth/1920,innerHeight/1080)*0.96;s.style.transform=`translate(${-1920*sc/2}px,${-1080*sc/2}px) scale(${sc})`;}
addEventListener('resize',scaleSlide);addEventListener('load',scaleSlide);scaleSlide();
</script>
<!-- notes: 수식 기반 알고리즘 formulation. hybrid feature vector, risk detector, inner-CV threshold calibration, risk-only typer, 3-fold OOF execution trace. -->
</body>
</html>
