<style>

  html,body{width:100%;height:100vh;background:#E4DFD3;overflow:hidden;position:relative;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  .stage{width:1920px;height:1080px;position:absolute;top:50%;left:50%;transform-origin:0 0;}
  .slide{width:1920px;height:1080px;overflow:hidden;position:relative;border-radius:4px;box-shadow:0 20px 80px rgba(0,0,0,0.14);}
  @media print{@page{size:1920px 1080px;margin:0;}html,body{width:1920px;height:1080px;background:transparent!important;overflow:hidden;-webkit-print-color-adjust:exact;print-color-adjust:exact;}.stage{position:static!important;top:0!important;left:0!important;transform:none!important;}.slide{box-shadow:none!important;border-radius:0!important;}*,*::before,*::after{-webkit-backdrop-filter:none!important;backdrop-filter:none!important;}}

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script type="text/babel" data-presets="react" src="components.js"></script>
</head>
<body>
<div class="stage" id="stage"><div class="slide" id="slide-root"></div></div>
<script type="text/babel" data-presets="react">

  {

function MissRow({m}){

function FailureCard({x}){
  return (

      <div style={{display:"grid",gridTemplateColumns:"58px 1fr auto",gap:16,alignItems:"baseline"}}>

function Slide(){
  return (
    <SlideFrame>

      <SlideTitle style={{marginTop:SPACING.titleGap}}>plain TF-IDFмқҳ мӢӨнҢЁлҠ” м җмҲҳ л¶ҖмЎұмқҙ м•„лӢҲлқј, <span style={{color:C.fake}}>мҳӨлҘҳ кө¬мЎ°к°Җ л¶„лӘ…н•ң мӢӨнҢЁ</span>мҳҖлӢӨ</SlideTitle>
      <BodyText muted style={{marginTop:20}}>baselineмқҖ кҙҖл Ё лүҙмҠӨ м„ лі„ мӢ нҳёлҠ” л°°мӣ м§Җл§Ң, мӢӨм ң м—°кө¬ gateк°Җ мҡ”кө¬н•ҳлҠ” м„ё к°Җм§Җ мҳӨлҘҳ мҳҲмӮ°мқ„ лӘЁл‘җ л„ҳм—ҲлӢӨ. мқҙ мӢӨнҢЁк°Җ лӢӨмқҢ м•Ңкі лҰ¬мҰҳ кі лҸ„нҷ”мқҳ м„Өкі„ мһ…л Ҙмқҙ лҗңлӢӨ.</BodyText>

      <div style={{position:"absolute",left:SPACING.paddingX,right:SPACING.paddingX,top:360,display:"grid",gridTemplateColumns:"0.72fr 1.28fr",gap:28,alignItems:"start"}}>

          </Card>
          <Card style={{padding:"24px 28px"}}>
            <div style={{fontFamily:FONT_DISPLAY,fontSize:44,fontWeight:800,color:C.fake,lineHeight:1}}>44 В· 53 В· 34</div>
            <div style={{fontFamily:FONT_SANS,fontSize:TYPE_SCALE.small,color:C.inkSoft,lineHeight:1.42,marginTop:12}}>

            </div>
          </Card>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>

      <Callout tone="fake" style={{position:"absolute",left:SPACING.paddingX,right:SPACING.paddingX,bottom:108,maxWidth:1560}}>м§„м§ң gapмқҖ TF-IDFк°Җ м•Ҫн•ҳлӢӨлҠ” л§җмқҙ м•„лӢҲлӢӨ вҖ” relevance, OOV mechanism, generic OTHERлҘј к°ҷмқҖ н‘ңнҳ„ кіөк°„м—җ л°Җм–ҙ л„ЈмқҖ кІғмқҙ л¬ём ңмҳҖлӢӨ.</Callout>
      <SourceLine>results/open_set_eval.json В· results/tables/open_set_oof_predictions.csv В· мҳӨлҘҳ л¶„м„қ мҡ”м•Ҫ</SourceLine>

  );
}
ReactDOM.createRoot(document.getElementById('slide-root')).render(<Slide/>);
requestAnimationFrame(()=>document.body.setAttribute('data-slide-ready','1'));
})();
</script>
<script>
function scaleSlide(){const s=document.getElementById('stage');if(!s)return;const sc=Math.min(innerWidth/1920,innerHeight/1080)*0.96;s.style.transform=`translate(${-1920*sc/2}px,${-1080*sc/2}px) scale(${sc})`;}
addEventListener('resize',scaleSlide);addEventListener('load',scaleSlide);scaleSlide();
</script>
<!-- notes: baseline gapмқ„ failure diagnosisлЎң мһ¬кө¬м„ұ. metric missліҙлӢӨ FP/FN/type wrongмқҳ кө¬мЎ°мҷҖ algorithmic fix м—°кІ°мқҙ н•өмӢ¬. -->
</body>
</html>
