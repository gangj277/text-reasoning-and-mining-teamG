<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 9 — METHOD — algorithm architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@500;600;700;800&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100vh;background:#E4DFD3;overflow:hidden;position:relative;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  .stage{width:1920px;height:1080px;position:absolute;top:50%;left:50%;transform-origin:0 0;}
  .slide{width:1920px;height:1080px;overflow:hidden;position:relative;border-radius:4px;box-shadow:0 20px 80px rgba(0,0,0,0.14);}
  table.tbl{width:100%;border-collapse:collapse;} table.tbl td,table.tbl th{padding:14px 18px;text-align:left;vertical-align:middle;border-bottom:1px solid rgba(31,39,48,0.12);}
  @media print{@page{size:1920px 1080px;margin:0;}html,body{width:1920px;height:1080px;background:transparent!important;overflow:hidden;-webkit-print-color-adjust:exact;print-color-adjust:exact;}.stage{position:static!important;top:0!important;left:0!important;transform:none!important;}.slide{box-shadow:none!important;border-radius:0!important;}*,*::before,*::after{-webkit-backdrop-filter:none!important;backdrop-filter:none!important;}}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script type="text/babel" data-presets="react" src="components.js"></script>
</head>
<body>
<div class="stage" id="stage"><div class="slide" id="slide-root"></div></div>
<script type="text/babel" data-presets="react">
(function(){
const { SlideFrame, Eyebrow, SlideTitle, BodyText, PageNum, Callout, Card, C, TYPE_SCALE, SPACING, FONT_DISPLAY, FONT_SANS, FONT_MONO, SourceLine } = window;
const FEATURE_BLOCKS = [
  {t:"word TF-IDF", d:"risk vocabulary and topic-level relevance", tone:"signal"},
  {t:"raw char n-gram", d:"bilingual variants, OOV terms, misspellings", tone:"signal"},
  {t:"mechanism counters", d:"taxonomy cues: strike, freight, tariff, cyber, disease", tone:"real"},
  {t:"OTHER/generic cues", d:"generic supply-chain discourse vs operational disruption", tone:"real"},
];
function FeatureBlock({x}){
  const col = x.tone === "real" ? C.real : C.accent;
  return (
    <div style={{background:x.tone==="real"?C.realSoft:C.accentSoft,border:`1px solid ${col}`,borderLeft:`4px solid ${col}`,borderRadius:"0 10px 10px 0",padding:"18px 20px",minHeight:126}}>
      <div style={{fontFamily:FONT_DISPLAY,fontSize:28,fontWeight:700,color:col,lineHeight:1.1}}>{x.t}</div>
      <div style={{fontFamily:FONT_SANS,fontSize:18,color:C.inkSoft,lineHeight:1.42,marginTop:10}}>{x.d}</div>
    </div>
  );
}
function PipeNode({tag,title,body,tone="default",wide=false}){
  const col = tone === "real" ? C.real : tone === "signal" ? C.accent : C.inkMuted;
  return (
    <div style={{background:C.panel,border:`1px solid ${tone==="real"?C.real:tone==="signal"?C.accent:C.rule}`,borderRadius:12,padding:"22px 24px",width:wide?380:300,minHeight:186}}>
      <div style={{fontFamily:FONT_MONO,fontSize:TYPE_SCALE.label,color:col,letterSpacing:"0.16em",textTransform:"uppercase",marginBottom:10}}>{tag}</div>
      <div style={{fontFamily:FONT_DISPLAY,fontSize:34,fontWeight:700,color:C.ink,lineHeight:1.08}}>{title}</div>
      <div style={{fontFamily:FONT_SANS,fontSize:19,color:C.inkSoft,lineHeight:1.43,marginTop:12}}>{body}</div>
    </div>
  );
}
function Slide(){
  return (
    <SlideFrame>
      <Eyebrow style={{marginLeft:0}}>09 · METHOD — algorithm architecture</Eyebrow>
      <SlideTitle style={{marginTop:SPACING.titleGap}}>알고리즘은 검색어를 복원하지 않고, 기사 안의 <span style={{color:C.real}}>위험 메커니즘</span>을 feature로 올린다</SlideTitle>
      <BodyText muted style={{marginTop:22}}>최종 엔진은 단일 분류기가 아니라 two-stage system이다. detector가 risk/OTHER를 먼저 결정하고, typer는 risk로 통과한 기사에만 주요 리스크 유형을 부여한다.</BodyText>

      <div style={{position:"absolute",left:SPACING.paddingX,right:SPACING.paddingX,top:392}}>
        <div style={{display:"flex",alignItems:"stretch",gap:18}}>
          <PipeNode tag="input" title="news item" body="headline + snippet, Korean/English mixed stream"/>
          <div style={{display:"flex",alignItems:"center",fontFamily:FONT_MONO,fontSize:34,color:C.inkMuted}}>→</div>
          <div style={{width:548,background:C.panel,border:`1px solid ${C.rule}`,borderRadius:12,padding:"22px 24px"}}>
            <div style={{fontFamily:FONT_MONO,fontSize:TYPE_SCALE.label,color:C.real,letterSpacing:"0.16em",textTransform:"uppercase",marginBottom:14}}>hybrid representation</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {FEATURE_BLOCKS.map((x,i)=><FeatureBlock key={i} x={x}/>)}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",fontFamily:FONT_MONO,fontSize:34,color:C.inkMuted}}>→</div>
          <PipeNode tag="stage 1" title="risk detector" tone="signal" body="precision floor를 만족하는 threshold로 risk vs OTHER 결정"/>
          <div style={{display:"flex",alignItems:"center",fontFamily:FONT_MONO,fontSize:34,color:C.inkMuted}}>→</div>
          <PipeNode tag="stage 2" title="risk typer" tone="real" body="통과한 risk 기사에만 7개 SCRM type 분류" wide/>
        </div>

      </div>

      <Callout tone="real" style={{position:"absolute",left:SPACING.paddingX,right:SPACING.paddingX,bottom:116,maxWidth:1560}}>고도화의 본질은 모델 크기가 아니라 feature 책임의 분리다 — relevance, mechanism, generic discourse를 각각 다르게 표현한다.</Callout>
      <SourceLine>본 연구 mechanism_features.py · train_mechanism_engine.py · mechanism_engine_eval.json</SourceLine>
      <PageNum n={9}/>
    </SlideFrame>
  );
}
ReactDOM.createRoot(document.getElementById('slide-root')).render(<Slide/>);
requestAnimationFrame(()=>document.body.setAttribute('data-slide-ready','1'));
})();
</script>
<script>
function scaleSlide(){const s=document.getElementById('stage');if(!s)return;const sc=Math.min(innerWidth/1920,innerHeight/1080)*0.96;s.style.transform=`translate(${-1920*sc/2}px,${-1080*sc/2}px) scale(${sc})`;}
addEventListener('resize',scaleSlide);addEventListener('load',scaleSlide);scaleSlide();
</script>
<!-- notes: algorithm architecture. Input -> hybrid representation(word TF-IDF, raw char ngram, mechanism counters, OTHER cues) -> risk detector -> risk typer. -->
</body>
</html>
