<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 5 — PROBLEM VALIDATION — why it matters</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@500;600;700;800&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100vh;background:#E4DFD3;overflow:hidden;position:relative;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  .stage{width:1920px;height:1080px;position:absolute;top:50%;left:50%;transform-origin:0 0;}
  .slide{width:1920px;height:1080px;overflow:hidden;position:relative;border-radius:4px;box-shadow:0 20px 80px rgba(0,0,0,0.14);}
  @media print{@page{size:1920px 1080px;margin:0;}html,body{width:1920px;height:1080px;background:transparent!important;overflow:hidden;-webkit-print-color-adjust:exact;print-color-adjust:exact;}.stage{position:static!important;top:0!important;left:0!important;transform:none!important;}.slide{box-shadow:none!important;border-radius:0!important;}*,*::before,*::after{-webkit-backdrop-filter:none!important;backdrop-filter:none!important;}}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script type="text/babel" data-presets="react" src="components.js"></script>
</head>
<body>
<div class="stage" id="stage"><div class="slide" id="slide-root"></div></div>
<script type="text/babel" data-presets="react">
(function(){
const { SlideFrame, Eyebrow, SlideTitle, BodyText, PageNum, Card, CardTitle, CardBody, Callout, C, TYPE_SCALE, SPACING, FONT_DISPLAY, FONT_SANS, FONT_MONO, SourceLine } = window;

const TESTS = [
  {
    n:"01",
    k:"조기성",
    q:"정형 KPI보다 먼저 관측되는가",
    proof:"홍해·희토류·대만 지진 사례에서 충격은 실적 수치가 아니라 뉴스 텍스트에 먼저 남았다.",
    tone:"signal"
  },
  {
    n:"02",
    k:"희소성",
    q:"관련 뉴스가 곧 위험 뉴스인가",
    proof:"중립질의 gold 699건 중 risk는 217건, OTHER는 482건이다. 즉 공급망 뉴스의 다수는 버려야 할 비위험 기사다.",
    tone:"real"
  },
  {
    n:"03",
    k:"이질성",
    q:"단순 키워드로 경계를 잡을 수 있는가",
    proof:"한·영 혼재, OOV 변형어, generic supply-chain 담론이 섞인다. 위험 메커니즘과 단순 관련성을 분리해야 한다.",
    tone:"signal"
  },
];

function TestCard({x}){
  const col = x.tone === "real" ? C.real : C.accent;
  const bg = x.tone === "real" ? C.realSoft : C.accentSoft;
  return (
    <Card style={{padding:"18px 23px 20px",minHeight:172,borderLeft:`5px solid ${col}`,background:bg}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div style={{fontFamily:FONT_MONO,fontSize:TYPE_SCALE.label,color:col,letterSpacing:"0.16em",textTransform:"uppercase"}}>{x.n} · {x.k}</div>
        <div style={{fontFamily:FONT_MONO,fontSize:13,color:C.inkMuted,letterSpacing:"0.08em"}}>PROBLEM TEST</div>
      </div>
      <CardTitle style={{fontSize:25,marginBottom:9,lineHeight:1.12}}>{x.q}</CardTitle>
      <CardBody style={{fontSize:18.5,lineHeight:1.38}}>{x.proof}</CardBody>
    </Card>
  );
}

function RatioBar(){
  return (
    <div style={{background:C.panel,border:`1px solid ${C.rule}`,borderRadius:12,padding:"22px 28px"}}>
      <div style={{display:"flex",alignItems:"baseline",gap:20,marginBottom:20}}>
        <div style={{fontFamily:FONT_DISPLAY,fontSize:64,fontWeight:800,color:C.real,lineHeight:0.9}}>31%</div>
        <div>
          <div style={{fontFamily:FONT_DISPLAY,fontSize:31,fontWeight:700,color:C.ink,lineHeight:1.1}}>risk articles</div>
          <div style={{fontFamily:FONT_MONO,fontSize:TYPE_SCALE.label,color:C.inkMuted,letterSpacing:"0.08em",marginTop:7}}>217 / 699 consensus gold</div>
        </div>
      </div>
      <div style={{height:24,borderRadius:999,overflow:"hidden",display:"flex",background:"rgba(31,39,48,0.08)",border:`1px solid ${C.ruleSoft}`}}>
        <div style={{width:"31%",background:C.real}} />
        <div style={{width:"69%",background:C.panelAlt}} />
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:12,fontFamily:FONT_MONO,fontSize:13,color:C.inkMuted,letterSpacing:"0.06em",textTransform:"uppercase"}}>
        <span>risk 217</span>
        <span>OTHER 482</span>
      </div>
      <div style={{marginTop:20,fontFamily:FONT_SANS,fontSize:20,color:C.inkSoft,lineHeight:1.42}}>
        이 비율은 핵심이다. “공급망 관련 기사”를 모았다고 해서 모두 위험이 아니다. 실제 엔진은 먼저 버릴 기사를 버리고, 남은 위험 기사에만 type을 붙여야 한다.
      </div>
    </div>
  );
}

function Slide(){
  return (
    <SlideFrame>
      <Eyebrow>05 · PROBLEM VALIDATION — 왜 진짜 문제인가</Eyebrow>
      <SlideTitle style={{marginTop:SPACING.titleGap}}>이 문제는 “분류해보자”가 아니라, <span style={{color:C.accent}}>실제 운영에서 동시에 터지는 세 조건</span>이다</SlideTitle>
      <BodyText muted style={{marginTop:20}}>연구 문제가 되려면 조기성, 희소성, 이질성이 동시에 있어야 한다. 본 데이터와 사례는 이 세 조건을 모두 만족한다.</BodyText>

      <div style={{position:"absolute",left:SPACING.paddingX,right:SPACING.paddingX,top:330,display:"grid",gridTemplateColumns:"1.08fr 0.92fr",gap:28,alignItems:"stretch"}}>
        <div style={{display:"grid",gridTemplateRows:"repeat(3,1fr)",gap:16}}>
          {TESTS.map((x,i)=><TestCard key={i} x={x}/>)}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          <RatioBar />
          <div style={{background:C.paper,border:`1px solid ${C.rule}`,borderRadius:12,padding:"22px 28px"}}>
            <div style={{fontFamily:FONT_MONO,fontSize:TYPE_SCALE.label,color:C.accent,letterSpacing:"0.16em",textTransform:"uppercase",marginBottom:13}}>research implication</div>
            <div style={{fontFamily:FONT_DISPLAY,fontSize:35,fontWeight:800,color:C.ink,lineHeight:1.08}}>closed-set 7유형 분류로는<br/>문제의 본체를 놓친다</div>
            <div style={{fontFamily:FONT_SANS,fontSize:20,color:C.inkSoft,lineHeight:1.42,marginTop:14}}>
              그래서 다음 장의 가설은 “어떤 유형인가”가 아니라 <b style={{color:C.ink}}>위험인가/아닌가를 먼저 맞히고</b>, 그 다음 유형을 붙이는 open-set triage로 출발한다.
            </div>
          </div>
        </div>
      </div>

      <Callout tone="signal" style={{position:"absolute",left:SPACING.paddingX,right:SPACING.paddingX,bottom:116,maxWidth:1560}}>따라서 본 연구의 난점은 데이터가 부족한 것이 아니라, 희소한 위험 신호를 대량·이질 뉴스 속에서 먼저 분리하는 것이다.</Callout>
      <SourceLine>본 연구 open-set gold n=699; GDELT Project; 최근 공급망 충격 사례 정리</SourceLine>
      <PageNum n={5}/>
    </SlideFrame>
  );
}
ReactDOM.createRoot(document.getElementById('slide-root')).render(<Slide/>);
requestAnimationFrame(()=>document.body.setAttribute('data-slide-ready','1'));
})();
</script>
<script>
function scaleSlide(){const s=document.getElementById('stage');if(!s)return;const sc=Math.min(innerWidth/1920,innerHeight/1080)*0.96;s.style.transform=`translate(${-1920*sc/2}px,${-1080*sc/2}px) scale(${sc})`;}
addEventListener('resize',scaleSlide);addEventListener('load',scaleSlide);scaleSlide();
</script>
<!-- notes: 문제 정당화. 연구 문제가 되려면 조기성, 희소성, 이질성이 동시에 있어야 하며, 사례와 699건 open-set gold가 이를 뒷받침한다. 다음은 가설. -->
</body>
</html>
