<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 2 — Executive Summary</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@500;600;700;800&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100vh;background:#E4DFD3;overflow:hidden;position:relative;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  .stage{width:1920px;height:1080px;position:absolute;top:50%;left:50%;transform-origin:0 0;}
  .slide{width:1920px;height:1080px;overflow:hidden;position:relative;border-radius:4px;box-shadow:0 20px 80px rgba(0,0,0,0.14);}
  @media print{@page{size:1920px 1080px;margin:0;}html,body{width:1920px;height:1080px;background:transparent!important;overflow:hidden;-webkit-print-color-adjust:exact;print-color-adjust:exact;}.stage{position:static!important;top:0!important;left:0!important;transform:none!important;}.slide{box-shadow:none!important;border-radius:0!important;}*,*::before,*::after{-webkit-backdrop-filter:none!important;backdrop-filter:none!important;}}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script type="text/babel" data-presets="react" src="components.js"></script>
</head>
<body>
<div class="stage" id="stage"><div class="slide" id="slide-root"></div></div>
<script type="text/babel" data-presets="react">
(function(){
const { SlideFrame, Eyebrow, SlideTitle, BodyText, PageNum, Callout, C, TYPE_SCALE, SPACING, FONT_DISPLAY, FONT_SANS, FONT_MONO, SourceLine } = window;

function ResultRow({metric, value, unit, mean, tone, star}){
  const col = tone==="real"?C.real:tone==="fake"?C.fake:C.ink;
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr auto",gridColumnGap:18,alignItems:"baseline",padding:"14px 0",borderBottom:`1px solid ${C.ruleSoft}`}}>
      <div>
        <div style={{fontFamily:FONT_SANS,fontSize:21,fontWeight:600,color:C.ink}}>{metric}{star&&<span style={{color:C.real,marginLeft:8}}>★</span>}</div>
        <div style={{fontFamily:FONT_SANS,fontSize:17,color:C.inkMuted,marginTop:3,lineHeight:1.35}}>{mean}</div>
      </div>
      <div style={{display:"flex",alignItems:"baseline",gap:5,justifySelf:"end"}}>
        {unit&&<span style={{fontFamily:FONT_MONO,fontSize:20,color:col,opacity:0.8}}>{unit}</span>}
        <span style={{fontFamily:FONT_DISPLAY,fontSize:48,fontWeight:800,color:col,lineHeight:0.9}}>{value}</span>
      </div>
    </div>
  );
}
function ResultCol({tag, tagColor, children}){
  return (
    <div style={{flex:1,background:C.panel,borderTop:`3px solid ${tagColor}`,borderRadius:"0 0 10px 10px",padding:"20px 28px 22px"}}>
      <div style={{fontFamily:FONT_MONO,fontSize:TYPE_SCALE.label,letterSpacing:"0.14em",color:tagColor,textTransform:"uppercase",marginBottom:8}}>{tag}</div>
      {children}
    </div>
  );
}

function Slide(){
  return (
    <SlideFrame>
      <Eyebrow>02 · EXECUTIVE SUMMARY — 연구 설계와 최종 엔진</Eyebrow>
      <SlideTitle style={{marginTop:SPACING.titleGap}}>우리는 SCRM 뉴스마이닝을 <span style={{color:C.accent}}>open-set triage</span> 문제로 재정의하고, 그 문제를 푸는 <span style={{color:C.real}}>mechanism-aware engine</span>을 검증했다</SlideTitle>
      <BodyText muted style={{marginTop:20}}>핵심은 단순 7유형 분류가 아니다. 실제 뉴스 스트림에는 OTHER가 많기 때문에, 먼저 위험 뉴스를 걸러내고 그 다음 위험 유형을 붙이는 two-stage engine으로 설계했다.</BodyText>

      <div style={{position:"absolute",left:SPACING.paddingX,right:SPACING.paddingX,top:392,display:"flex",gap:22,alignItems:"flex-start"}}>
        <ResultCol tag="연구 설계 — 실험이 풀어야 할 문제" tagColor={C.accent}>
          <ResultRow metric="문제 정의" value="open" tone="signal" mean="risk vs OTHER 탐지 후, 위험 기사만 7유형으로 typing"/>
          <ResultRow metric="골드셋" value="699" tone="signal" mean="중립질의 700건 → 3인 패널 consensus open-set gold"/>
          <ResultRow metric="검증 방식" value="OOF" tone="signal" mean="3-fold out-of-fold 평가와 inner-CV threshold calibration"/>
          <ResultRow metric="성공 기준" value="gate" tone="signal" mean="accuracy·risk-F1·AUPRC·type-F1·error budget 사전 고정"/>
        </ResultCol>
        <ResultCol tag="고도화 후 gate를 통과한 최종 엔진" tagColor={C.real}>
          <ResultRow metric="mechanism-aware risk-F1" value="0.861" tone="real" star mean="plain two-stage baseline 대비 +0.089 개선"/>
          <ResultRow metric="open-set AUPRC" value="0.923" tone="real" mean="중립 뉴스 스트림에서 위험/OTHER 분리력 확보"/>
          <ResultRow metric="8-way accuracy" value="0.884" tone="real" mean="OTHER 포함 699건 OOF 평가"/>
          <ResultRow metric="fixed research gate" value="PASS" tone="real" mean="precision·recall·F1·AUPRC·error budget 모두 통과"/>
        </ResultCol>
      </div>

      <Callout tone="real" style={{position:"absolute",left:SPACING.paddingX,right:SPACING.paddingX,bottom:116,maxWidth:1560}}>발표의 중심은 점수 자체가 아니라, open-set 실험 설계가 알고리즘 설계로 이어지고 fixed gate로 검증된 흐름이다.</Callout>
      <SourceLine>본 연구 metrics.json · mechanism_engine_eval.json · research_gate.json</SourceLine>
      <PageNum n={2}/>
    </SlideFrame>
  );
}
ReactDOM.createRoot(document.getElementById('slide-root')).render(<Slide/>);
requestAnimationFrame(()=>document.body.setAttribute('data-slide-ready','1'));
})();
</script>
<script>
function scaleSlide(){const s=document.getElementById('stage');if(!s)return;const sc=Math.min(innerWidth/1920,innerHeight/1080)*0.96;s.style.transform=`translate(${-1920*sc/2}px,${-1080*sc/2}px) scale(${sc})`;}
addEventListener('resize',scaleSlide);addEventListener('load',scaleSlide);scaleSlide();
</script>
<!-- notes: Executive summary = 연구 설계 + 최종 엔진 성과. open-set triage, 699 consensus gold, 3-fold OOF, fixed gate, mechanism-aware risk-F1 0.861/AUPRC 0.923/acc 0.884/gate pass. -->
</body>
</html>
