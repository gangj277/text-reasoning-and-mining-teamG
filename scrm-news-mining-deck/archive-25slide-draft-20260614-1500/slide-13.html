<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 13 — METHOD — research gate</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@500;600;700;800&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100vh;background:#E4DFD3;overflow:hidden;position:relative;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  .stage{width:1920px;height:1080px;position:absolute;top:50%;left:50%;transform-origin:0 0;}
  .slide{width:1920px;height:1080px;overflow:hidden;position:relative;border-radius:4px;box-shadow:0 20px 80px rgba(0,0,0,0.14);}
  @media print{@page{size:1920px 1080px;margin:0;}html,body{width:1920px;height:1080px;background:transparent!important;overflow:hidden;-webkit-print-color-adjust:exact;print-color-adjust:exact;}.stage{position:static!important;top:0!important;left:0!important;transform:none!important;}.slide{box-shadow:none!important;border-radius:0!important;}*,*::before,*::after{-webkit-backdrop-filter:none!important;backdrop-filter:none!important;}}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script type="text/babel" data-presets="react" src="components.js"></script>
</head>
<body>
<div class="stage" id="stage"><div class="slide" id="slide-root"></div></div>
<script type="text/babel" data-presets="react">
(function(){
const { SlideFrame, Eyebrow, SlideTitle, BodyText, PageNum, Card, Callout, C, TYPE_SCALE, SPACING, FONT_DISPLAY, FONT_SANS, FONT_MONO, SourceLine } = window;
const GATES = [
  {m:"accuracy", th:"≥ 0.85", obs:"0.884", v:0.884},
  {m:"present macro-F1", th:"≥ 0.65", obs:"0.696", v:0.696},
  {m:"risk precision", th:"≥ 0.84", obs:"0.880", v:0.880},
  {m:"risk recall", th:"≥ 0.82", obs:"0.843", v:0.843},
  {m:"risk-F1", th:"≥ 0.85", obs:"0.861", v:0.861},
  {m:"AUPRC", th:"≥ 0.90", obs:"0.923", v:0.923},
  {m:"risk-type macro-F1", th:"≥ 0.65", obs:"0.697", v:0.697},
];
const BUDGET = [
  {m:"false positive", th:"≤ 30", obs:"25"},
  {m:"false negative", th:"≤ 40", obs:"34"},
  {m:"type wrong", th:"≤ 25", obs:"22"},
];
function GateRow({g}){
  return (
    <div style={{display:"grid",gridTemplateColumns:"250px 120px 1fr 108px",gap:16,alignItems:"center",padding:"12px 0",borderBottom:`1px solid ${C.ruleSoft}`}}>
      <div style={{fontFamily:FONT_SANS,fontSize:20,fontWeight:600,color:C.ink}}>{g.m}</div>
      <div style={{fontFamily:FONT_MONO,fontSize:15,color:C.inkMuted,letterSpacing:"0.06em"}}>{g.th}</div>
      <div style={{height:15,background:C.ruleSoft,borderRadius:3,position:"relative"}}>
        <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${g.v*100}%`,background:C.real,borderRadius:3}}/>
      </div>
      <div style={{fontFamily:FONT_MONO,fontSize:21,fontWeight:600,color:C.real,textAlign:"right"}}>{g.obs}</div>
    </div>
  );
}
function BudgetChip({b}){
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10,alignItems:"baseline",padding:"14px 0",borderBottom:`1px solid ${C.ruleSoft}`}}>
      <div>
        <div style={{fontFamily:FONT_SANS,fontSize:21,fontWeight:600,color:C.ink}}>{b.m}</div>
        <div style={{fontFamily:FONT_MONO,fontSize:13,color:C.inkMuted,letterSpacing:"0.08em",marginTop:4}}>gate {b.th}</div>
      </div>
      <div style={{fontFamily:FONT_DISPLAY,fontSize:52,fontWeight:800,color:C.real,lineHeight:0.9}}>{b.obs}</div>
    </div>
  );
}
function Slide(){
  return (
    <SlideFrame>
      <Eyebrow>13 · METHOD — fixed research gate</Eyebrow>
      <SlideTitle style={{marginTop:SPACING.titleGap}}>성과 기준은 사후 해석이 아니라, <span style={{color:C.real}}>사전에 고정한 KPI gate</span>다</SlideTitle>
      <BodyText muted style={{marginTop:22}}>단일 accuracy로는 SCRM triage를 검증할 수 없다. detector 품질, typing 품질, 그리고 실제 운영에서 감당 가능한 error budget을 동시에 통과해야 연구 성과라고 본다.</BodyText>

      <div style={{position:"absolute",left:SPACING.paddingX,top:386,width:1120}}>
        <div style={{fontFamily:FONT_MONO,fontSize:TYPE_SCALE.label,color:C.real,letterSpacing:"0.16em",textTransform:"uppercase",marginBottom:14}}>metric gate · 3-fold OOF · n=699</div>
        <div style={{background:C.panel,border:`1px solid ${C.rule}`,borderRadius:10,padding:"16px 28px 18px"}}>
          {GATES.map((g,i)=><GateRow key={i} g={g}/>)}
        </div>
      </div>

      <div style={{position:"absolute",right:SPACING.paddingX,top:386,width:540,display:"flex",flexDirection:"column",gap:16}}>
        <Card tone="real" style={{padding:"22px 26px"}}>
          <div style={{fontFamily:FONT_MONO,fontSize:TYPE_SCALE.label,color:C.real,letterSpacing:"0.16em",textTransform:"uppercase",marginBottom:8}}>error budget · PASS</div>
          {BUDGET.map((b,i)=><BudgetChip key={i} b={b}/>)}
        </Card>
        <Card style={{padding:"20px 24px"}}>
          <div style={{fontFamily:FONT_SANS,fontSize:TYPE_SCALE.small,color:C.inkSoft,lineHeight:1.46}}>
            threshold는 evaluation fold를 보지 않고 inner-CV에서 calibration한다. 따라서 gate 통과는 사후 튜닝이 아니라 재현 가능한 평가 결과다.
          </div>
        </Card>
      </div>

      <Callout tone="real" style={{position:"absolute",left:SPACING.paddingX,right:SPACING.paddingX,bottom:118,maxWidth:1560}}>이 gate가 뒤 슬라이드의 판정 기준이다 — baseline gap과 최종 엔진 개선은 같은 기준으로 비교된다.</Callout>
      <SourceLine>본 연구 research_gate.json · mechanism_engine_eval.json</SourceLine>
      <PageNum n={13}/>
    </SlideFrame>
  );
}
ReactDOM.createRoot(document.getElementById('slide-root')).render(<Slide/>);
requestAnimationFrame(()=>document.body.setAttribute('data-slide-ready','1'));
})();
</script>
<script>
function scaleSlide(){const s=document.getElementById('stage');if(!s)return;const sc=Math.min(innerWidth/1920,innerHeight/1080)*0.96;s.style.transform=`translate(${-1920*sc/2}px,${-1080*sc/2}px) scale(${sc})`;}
addEventListener('resize',scaleSlide);addEventListener('load',scaleSlide);scaleSlide();
</script>
<!-- notes: fixed research gate. Accuracy, present macro-F1, risk precision/recall/F1, AUPRC, risk-type macro-F1, FP/FN/type wrong budgets. -->
</body>
</html>
