<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 14 — RESOLUTION — pivot</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@500;600;700;800&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100vh;background:#E4DFD3;overflow:hidden;position:relative;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  .stage{width:1920px;height:1080px;position:absolute;top:50%;left:50%;transform-origin:0 0;}
  .slide{width:1920px;height:1080px;overflow:hidden;position:relative;border-radius:4px;box-shadow:0 20px 80px rgba(0,0,0,0.14);}
  table.tbl{width:100%;border-collapse:collapse;} table.tbl td,table.tbl th{padding:14px 18px;text-align:left;vertical-align:middle;border-bottom:1px solid rgba(31,39,48,0.12);}
  @media print{@page{size:1920px 1080px;margin:0;}html,body{width:1920px;height:1080px;background:transparent!important;overflow:hidden;-webkit-print-color-adjust:exact;print-color-adjust:exact;}.stage{position:static!important;top:0!important;left:0!important;transform:none!important;}.slide{box-shadow:none!important;border-radius:0!important;}*,*::before,*::after{-webkit-backdrop-filter:none!important;backdrop-filter:none!important;}}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script type="text/babel" data-presets="react" src="components.js"></script>
</head>
<body>
<div class="stage" id="stage"><div class="slide" id="slide-root"></div></div>
<script type="text/babel" data-presets="react">
(function(){
const { SlideFrame, Eyebrow, SlideTitle, BodyText, PageNum, ComparisonColumn, Callout, C, TYPE_SCALE, SPACING, FONT_DISPLAY, FONT_SANS, FONT_MONO } = window;
const EXPERIMENT = [
  "Google News RSS에서 한·영 공급망 뉴스를 수집하고 중복·언어·날짜를 정규화한다.",
  "중립 질의 기반 표본에 3인 패널 라벨을 붙여 open-set gold를 만든다.",
  "모든 보고 지표는 3-fold OOF 예측만 합산해 계산한다.",
];
const ENGINE = [
  "word TF-IDF와 raw char n-gram으로 relevance와 OOV 변형을 동시에 잡는다.",
  "taxonomy mechanism counter와 OTHER/generic cue로 operational disruption을 분리한다.",
  "risk detector threshold를 inner-CV에서 정하고, risk 기사만 type classifier로 넘긴다.",
];
function Slide(){
  return (
    <SlideFrame>
      <Eyebrow>14 · RESOLUTION — 방법론적 전환</Eyebrow>
      <SlideTitle style={{marginTop:SPACING.titleGap}}>파이프라인은 <span style={{color:C.accent}}>실험 설계</span>와 <span style={{color:C.real}}>엔진 설계</span>가 같은 gate로 닫히도록 만들었다</SlideTitle>
      <BodyText muted style={{marginTop:20}}>핵심 전환: 데이터를 만든 방식과 알고리즘을 고도화한 이유가 분리되지 않는다. open-set gold에서 드러난 오류가 feature와 threshold 설계로 다시 들어간다.</BodyText>

      {/* ── two-column build↔break with a center loop connector ── */}
      <div style={{position:"absolute",left:SPACING.paddingX,right:SPACING.paddingX,top:404,display:"flex",alignItems:"stretch",gap:128}}>
        <ComparisonColumn
          tag="BUILD · 구축"
          tone="signal"
          title="수집 · 라벨 · OOF 평가"
          items={EXPERIMENT}
          style={{paddingBottom:30}}
        />
        <ComparisonColumn
          tag="ENGINE · 고도화"
          tone="real"
          title="hybrid feature · two-stage decision"
          items={ENGINE}
          style={{paddingBottom:30}}
        />
      </div>

      {/* ── center loop: BUILD feeds BREAK, BREAK feeds back ── */}
      <div style={{position:"absolute",left:"50%",top:430,transform:"translateX(-50%)",width:128,display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
        <div style={{fontFamily:FONT_MONO,fontSize:22,color:C.accent,letterSpacing:"0.04em"}}>→</div>
        <div style={{width:1,height:118,background:C.rule}}/>
        <div style={{fontFamily:FONT_MONO,fontSize:11,color:C.inkMuted,letterSpacing:"0.18em",writingMode:"vertical-rl",textTransform:"uppercase"}}>GATE</div>
        <div style={{width:1,height:118,background:C.rule}}/>
        <div style={{fontFamily:FONT_MONO,fontSize:22,color:C.real,letterSpacing:"0.04em"}}>↺</div>
      </div>

      {/* ── governing principle strip ── */}
      <div style={{position:"absolute",left:SPACING.paddingX,right:SPACING.paddingX,top:792,borderTop:`1px solid ${C.rule}`,paddingTop:24,display:"flex",alignItems:"center",gap:26}}>
        <span style={{fontFamily:FONT_MONO,fontSize:TYPE_SCALE.label,color:C.accent,letterSpacing:"0.16em",whiteSpace:"nowrap"}}>운영 원칙</span>
        <span style={{fontFamily:FONT_SANS,fontSize:TYPE_SCALE.body,fontWeight:500,color:C.ink,lineHeight:1.4}}>
          baseline에서 확인된 FP·FN·type error를 feature와 threshold 설계로 반영하고, 같은 fixed gate로 다시 평가한다.
        </span>
      </div>

      <Callout tone="real" style={{position:"absolute",left:SPACING.paddingX,right:SPACING.paddingX,bottom:116,maxWidth:1560}}>목표는 모델 하나를 자랑하는 것이 아니라, 데이터·알고리즘·평가 기준이 맞물린 재현 가능한 연구 파이프라인이다.</Callout>
      <PageNum n={14}/>
    </SlideFrame>
  );
}
ReactDOM.createRoot(document.getElementById('slide-root')).render(<Slide/>);
requestAnimationFrame(()=>document.body.setAttribute('data-slide-ready','1'));
})();
</script>
<script>
function scaleSlide(){const s=document.getElementById('stage');if(!s)return;const sc=Math.min(innerWidth/1920,innerHeight/1080)*0.96;s.style.transform=`translate(${-1920*sc/2}px,${-1080*sc/2}px) scale(${sc})`;}
addEventListener('resize',scaleSlide);addEventListener('load',scaleSlide);scaleSlide();
</script>
<!-- notes: 핵심 피벗. 실험 설계(수집, 라벨, OOF)와 엔진 설계(hybrid feature, two-stage, threshold)가 fixed gate로 닫히는 구조. -->
</body>
</html>
