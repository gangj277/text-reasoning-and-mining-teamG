<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 8 — Complication</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@500;600;700;800&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100vh;background:#E4DFD3;overflow:hidden;position:relative;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  .stage{width:1920px;height:1080px;position:absolute;top:50%;left:50%;transform-origin:0 0;}
  .slide{width:1920px;height:1080px;overflow:hidden;position:relative;border-radius:4px;box-shadow:0 20px 80px rgba(0,0,0,0.14);}
  table.tbl{width:100%;border-collapse:collapse;} table.tbl td,table.tbl th{padding:14px 18px;text-align:left;vertical-align:middle;border-bottom:1px solid rgba(31,39,48,0.12);}
  @media print{@page{size:1920px 1080px;margin:0;}html,body{width:1920px;height:1080px;background:transparent!important;overflow:hidden;-webkit-print-color-adjust:exact;print-color-adjust:exact;}.stage{position:static!important;top:0!important;left:0!important;transform:none!important;}.slide{box-shadow:none!important;border-radius:0!important;}*,*::before,*::after{-webkit-backdrop-filter:none!important;backdrop-filter:none!important;}}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script type="text/babel" data-presets="react" src="components.js"></script>
</head>
<body>
<div class="stage" id="stage"><div class="slide" id="slide-root"></div></div>
<script type="text/babel" data-presets="react">
(function(){
const { SlideFrame, Eyebrow, SlideTitle, BodyText, PageNum, MetricTile, Card, CardTitle, CardBody, Callout, C, TYPE_SCALE, SPACING, FONT_DISPLAY, FONT_SANS, FONT_MONO, SourceLine } = window;

const BARRIERS = [
  { n:"01", t:"전수 모니터링은 사람으로 불가능", b:<>하루 100만 건을 사람이 직접 읽는 것은 물리적으로 불가능하다 — 분석가가 보는 순간 그 신호는 이미 며칠 전 것이다.</> },
  { n:"02", t:"신호가 한·영에 혼재한다", b:<>핵심 신호는 한국어와 영어에 흩어져 있다. 단일언어 도구는 구조적으로 <span style={{color:C.fake,fontWeight:600}}>절반을 놓친다</span>.</> },
  { n:"03", t:"기존 SCRM은 정형·지연 지표에 의존", b:<>재고·리드타임 같은 정형 데이터는 충격이 끝난 뒤에야 움직인다 — 측정되는 순간 이미 <span style={{color:C.fake,fontWeight:600}}>사후</span>다.</> },
];

function Slide(){
  return (
    <SlideFrame>
      <Eyebrow style={{marginLeft:0}}>08 · COMPLICATION — 읽기의 병목</Eyebrow>
      <SlideTitle style={{marginTop:SPACING.titleGap}}>문제는 신호가 아니라 <span style={{color:C.accent}}>'읽기'</span>다 —<br/>하루 100만 건의 뉴스, 한·영 혼재, 사람은 못 본다</SlideTitle>
      <BodyText muted style={{marginTop:20}}>신호는 넘치지만 사람이 제때 읽지 못한다. 기존 SCRM은 정형·지연 지표에 의존해 사후 반응에 그친다.</BodyText>

      {/* LEFT — hero scale of the firehose */}
      <div style={{position:"absolute",left:SPACING.paddingX,top:408,width:560}}>
        <Eyebrow color={C.inkMuted} style={{marginBottom:18}}>THE FIREHOSE — 읽어야 할 양</Eyebrow>
        <MetricTile value="100만" unit="건/일" label="GDELT GKG — 인간 분석가가 마주하는 신호의 절대량" sub="2억+ 레코드 · 100개 언어 · 15분 갱신"/>
        <div style={{marginTop:34,paddingTop:24,borderTop:`1px solid ${C.rule}`,display:"flex",gap:40}}>
          <div>
            <div style={{fontFamily:FONT_DISPLAY,fontSize:52,fontWeight:800,color:C.fake,lineHeight:0.9,textDecoration:"line-through",textDecorationThickness:3}}>~0%</div>
            <div style={{fontFamily:FONT_MONO,fontSize:TYPE_SCALE.label,color:C.fake,marginTop:10,letterSpacing:"0.06em"}}>사람이 실제로 읽는 비율</div>
          </div>
          <div style={{borderLeft:`1px solid ${C.rule}`,paddingLeft:34,maxWidth:230}}>
            <div style={{fontFamily:FONT_SANS,fontSize:TYPE_SCALE.small,color:C.inkSoft,lineHeight:1.45}}>신호의 공급은 폭발했지만, 읽기의 용량은 한 사람에 묶여 있다.</div>
          </div>
        </div>
      </div>

      {/* RIGHT — three structural barriers */}
      <div style={{position:"absolute",right:SPACING.paddingX,top:408,width:920,display:"flex",flexDirection:"column",gap:16}}>
        <div style={{fontFamily:FONT_MONO,fontSize:TYPE_SCALE.label,color:C.inkMuted,letterSpacing:"0.2em",textTransform:"uppercase"}}>왜 못 읽는가 — 세 개의 구조적 벽</div>
        {BARRIERS.map((x,i)=>(
          <Card key={i} tone="fake" style={{padding:"20px 26px"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:20}}>
              <span style={{fontFamily:FONT_DISPLAY,fontSize:34,fontWeight:800,color:C.fake,lineHeight:1,flex:"0 0 auto",opacity:0.85}}>{x.n}</span>
              <div>
                <CardTitle style={{fontSize:23,marginBottom:7}}>{x.t}</CardTitle>
                <CardBody style={{fontSize:19.5,lineHeight:1.42}}>{x.b}</CardBody>
              </div>
            </div>
          </Card>
        ))}
      </div>

      <Callout tone="signal" style={{position:"absolute",left:SPACING.paddingX,right:SPACING.paddingX,bottom:116,maxWidth:1560}}>정형 데이터가 신호를 줄 땐 이미 늦다 — 그럼 기존 도구는?</Callout>
      <SourceLine>GDELT Project; SCRM 텍스트마이닝 SLR</SourceLine>
      <PageNum n={8}/>
    </SlideFrame>
  );
}
ReactDOM.createRoot(document.getElementById('slide-root')).render(<Slide/>);
requestAnimationFrame(()=>document.body.setAttribute('data-slide-ready','1'));
})();
</script>
<script>
function scaleSlide(){const s=document.getElementById('stage');if(!s)return;const sc=Math.min(innerWidth/1920,innerHeight/1080)*0.96;s.style.transform=`translate(${-1920*sc/2}px,${-1080*sc/2}px) scale(${sc})`;}
addEventListener('resize',scaleSlide);addEventListener('load',scaleSlide);scaleSlide();
</script>
<!-- notes: COMPLICATION. 병목은 신호 부족이 아니라 읽기. 좌측 100만건/일 GDELT 히어로 + ~0% 읽힘. 우측 3개 구조적 벽(전수 불가/한영 혼재/정형 지연). 다음: 기존 SCRM 도구의 한계. -->
</body>
</html>
