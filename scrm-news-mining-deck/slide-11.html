<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 11 — METHOD — fixed research gate</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@500;600;700;800&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100vh;background:#E4DFD3;overflow:hidden;position:relative;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  .stage{width:1920px;height:1080px;position:absolute;top:50%;left:50%;transform-origin:0 0;}
  .slide{width:1920px;height:1080px;overflow:hidden;position:relative;border-radius:4px;box-shadow:0 20px 80px rgba(0,0,0,0.14);}
  table.tbl{width:100%;border-collapse:collapse;} table.tbl td,table.tbl th{padding:12px 14px;text-align:left;vertical-align:middle;border-bottom:1px solid rgba(31,39,48,0.10);}
  @media print{@page{size:1920px 1080px;margin:0;}html,body{width:1920px;height:1080px;background:transparent!important;overflow:hidden;-webkit-print-color-adjust:exact;print-color-adjust:exact;}.stage{position:static!important;top:0!important;left:0!important;transform:none!important;}.slide{box-shadow:none!important;border-radius:0!important;}*,*::before,*::after{-webkit-backdrop-filter:none!important;backdrop-filter:none!important;}}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script type="text/babel" data-presets="react" src="components.js"></script>
</head>
<body>
<div class="stage" id="stage"><div class="slide" id="slide-root"></div></div>
<script type="text/babel" data-presets="react">
(function(){
const { SlideFrame, Eyebrow, SlideTitle, BodyText, PageNum, Card, Callout, C, TYPE_SCALE, SPACING, FONT_DISPLAY, FONT_SANS, FONT_MONO, SourceLine } = window;
const METRICS = [
  ["accuracy", "≥ .850", ".884"],
  ["present macro-F1", "≥ .650", ".696"],
  ["risk precision", "≥ .840", ".880"],
  ["risk recall", "≥ .820", ".843"],
  ["risk-F1", "≥ .850", ".861"],
  ["AUPRC", "≥ .900", ".923"],
  ["risk-type macro-F1", "≥ .650", ".697"],
];
const PROTOCOL = [
  ["01", "평가 단위", "699건 open-set gold 전체를 평가한다. risk subset 점수만으로는 인정하지 않는다."],
  ["02", "threshold 선택", "evaluation fold를 보지 않고 training fold 내부 OOF score로 τ를 고른다."],
  ["03", "통과 조건", "detector, typer, error budget이 모두 통과해야 PASS다."],
];
const BUDGET = [
  ["FP", "false positive", "≤30", "25"],
  ["FN", "false negative", "≤40", "34"],
  ["TW", "type wrong", "≤25", "22"],
];
function ProtocolItem({p}){
  return (
    <div style={{display:"grid",gridTemplateColumns:"52px 1fr",gap:14,padding:"12px 0",borderBottom:`1px solid ${C.ruleSoft}`}}>
      <div style={{fontFamily:FONT_DISPLAY,fontSize:30,fontWeight:800,color:C.accent,lineHeight:0.9}}>{p[0]}</div>
      <div>
        <div style={{fontFamily:FONT_DISPLAY,fontSize:23,fontWeight:700,color:C.ink,lineHeight:1.1}}>{p[1]}</div>
        <div style={{fontFamily:FONT_SANS,fontSize:17,color:C.inkSoft,lineHeight:1.34,marginTop:6}}>{p[2]}</div>
      </div>
    </div>
  );
}
function MetricRow({m}){
  return (
    <tr>
      <td style={{fontFamily:FONT_SANS,fontSize:17,color:C.ink,fontWeight:600}}>{m[0]}</td>
      <td style={{fontFamily:FONT_MONO,fontSize:14,color:C.inkMuted,letterSpacing:"0.04em"}}>{m[1]}</td>
      <td style={{fontFamily:FONT_MONO,fontSize:18,color:C.real,fontWeight:600,textAlign:"right"}}>{m[2]}</td>
      <td style={{fontFamily:FONT_MONO,fontSize:12,color:C.real,letterSpacing:"0.1em",textAlign:"right"}}>PASS</td>
    </tr>
  );
}
function BudgetTile({b}){
  return (
    <div style={{background:C.realSoft,border:`1px solid rgba(44,138,115,0.28)`,borderRadius:10,padding:"14px 16px 13px"}}>
      <div style={{fontFamily:FONT_MONO,fontSize:12,color:C.real,letterSpacing:"0.12em"}}>{b[0]}</div>
      <div style={{fontFamily:FONT_DISPLAY,fontSize:42,fontWeight:800,color:C.real,lineHeight:0.9,marginTop:6}}>{b[3]}</div>
      <div style={{fontFamily:FONT_SANS,fontSize:16,color:C.inkSoft,lineHeight:1.25,marginTop:7}}>{b[1]}</div>
      <div style={{fontFamily:FONT_MONO,fontSize:12,color:C.inkMuted,letterSpacing:"0.05em",marginTop:4}}>gate {b[2]}</div>
    </div>
  );
}
function Slide(){
  return (
    <SlideFrame>
      <Eyebrow>11 · METHOD — fixed research gate</Eyebrow>
      <SlideTitle size={38} style={{marginTop:SPACING.titleGap,maxWidth:1540}}>성과 기준은 점수가 아니라, <span style={{color:C.real}}>사전에 고정한 검증 계약</span>이다</SlideTitle>
      <BodyText muted size={22} style={{marginTop:18,maxWidth:1420}}>SCRM triage는 위험을 놓치면 안 되고, 일반 뉴스를 너무 많이 위험으로 올려도 안 된다. 그래서 threshold, metric, error budget을 평가 전에 고정했다.</BodyText>

      <div style={{position:"absolute",left:SPACING.paddingX,right:SPACING.paddingX,top:334,display:"grid",gridTemplateColumns:"0.92fr 0.92fr 0.72fr",gap:22,alignItems:"stretch"}}>
        <Card tone="signal" style={{padding:"20px 24px"}}>
          <div style={{fontFamily:FONT_MONO,fontSize:13,color:C.accent,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:8}}>evaluation contract</div>
          {PROTOCOL.map((p,i)=><ProtocolItem key={i} p={p}/>)}
        </Card>

        <Card style={{padding:"20px 24px"}}>
          <div style={{fontFamily:FONT_MONO,fontSize:13,color:C.real,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:12}}>metric floor · observed</div>
          <table className="tbl">
            <tbody>{METRICS.map((m,i)=><MetricRow key={i} m={m}/>)}</tbody>
          </table>
        </Card>

        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Card tone="real" style={{padding:"18px 20px"}}>
            <div style={{fontFamily:FONT_MONO,fontSize:13,color:C.real,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:12}}>error budget</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr",gap:10}}>
              {BUDGET.map((b,i)=><BudgetTile key={i} b={b}/>)}
            </div>
          </Card>
        </div>
      </div>

      <Callout tone="real" style={{position:"absolute",left:SPACING.paddingX,right:SPACING.paddingX,bottom:102,maxWidth:1560}}>이 장은 결과 발표가 아니라 판정 규칙이다 — baseline과 final engine은 모두 이 계약에 의해 평가된다.</Callout>
      <SourceLine>src/research_gate.py · results/research_gate.json</SourceLine>
      <PageNum n={11}/>
    </SlideFrame>
  );
}
ReactDOM.createRoot(document.getElementById('slide-root')).render(<Slide/>);
requestAnimationFrame(()=>document.body.setAttribute('data-slide-ready','1'));
})();
</script>
<script>
function scaleSlide(){const s=document.getElementById('stage');if(!s)return;const sc=Math.min(innerWidth/1920,innerHeight/1080)*0.96;s.style.transform=`translate(${-1920*sc/2}px,${-1080*sc/2}px) scale(${sc})`;}
addEventListener('resize',scaleSlide);addEventListener('load',scaleSlide);scaleSlide();
</script>
<!-- notes: fixed research gate를 검증 계약으로 재구성. OOF, threshold calibration, metric floors, error budgets. -->
</body>
</html>
